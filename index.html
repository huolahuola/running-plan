<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跑起来 · 12周新手跑步计划</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.15);
      --orange: #f97316;
      --bg: #080d17;
      --card: #0f1623;
      --card2: #161e2e;
      --border: rgba(255,255,255,0.07);
      --text: #f1f5f9;
      --gray: #64748b;
    }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; min-height: 100vh; }

    .glass { background: var(--card); border: 1px solid var(--border); }
    .glass2 { background: var(--card2); border: 1px solid var(--border); }
    .green-glow { box-shadow: 0 0 24px rgba(34,197,94,0.2); }
    .accent { color: var(--green); }
    .accent-bg { background: var(--green); }

    /* Hero gradient */
    .hero-bg {
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(34,197,94,0.12) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 40% at 80% 80%, rgba(249,115,22,0.06) 0%, transparent 60%),
                  var(--bg);
    }

    /* Week pill */
    .week-pill { flex-shrink: 0; width: 64px; cursor: pointer; transition: all .2s; }
    .week-pill .dot { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; transition: all .2s; border: 2px solid transparent; }
    .week-pill.done .dot { background: var(--green); color: #000; }
    .week-pill.current .dot { background: var(--green-dim); border-color: var(--green); color: var(--green); box-shadow: 0 0 16px rgba(34,197,94,0.3); }
    .week-pill.future .dot { background: rgba(255,255,255,0.05); color: var(--gray); border-color: rgba(255,255,255,0.08); }
    .week-pill.active .dot { transform: scale(1.15); }

    /* Knowledge card */
    .know-card { border-left: 3px solid var(--green); }
    .locked-card { border-left: 3px solid var(--border); opacity: .55; }

    /* Tab */
    .tab { padding: 8px 20px; border-radius: 999px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all .2s; color: var(--gray); }
    .tab.active { background: var(--green-dim); color: var(--green); }

    /* Session card */
    .session { border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; border: 1px solid var(--border); background: var(--card2); transition: border-color .2s; }
    .session:hover { border-color: rgba(34,197,94,0.3); }
    .session.rest { border-color: rgba(249,115,22,0.15); }

    /* Progress bar */
    .prog-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--green), #86efac); border-radius: 2px; transition: width .6s ease; }

    /* Roadmap line */
    .roadmap-line { position: absolute; top: 20px; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--green) var(--prog, 0%), rgba(255,255,255,0.08) var(--prog, 0%)); }

    /* Scrollbar */
    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* Badge */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .badge-green { background: var(--green-dim); color: var(--green); }
    .badge-orange { background: rgba(249,115,22,0.12); color: var(--orange); }
    .badge-gray { background: rgba(255,255,255,0.06); color: var(--gray); }

    /* Zone bars */
    .zone-bar { height: 28px; border-radius: 6px; display: flex; align-items: center; padding: 0 10px; font-size: 12px; font-weight: 600; margin-bottom: 4px; transition: width .5s; }

    /* Animate in */
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    .fade-up { animation: fadeUp .4s ease forwards; }

    /* Pulse */
    @keyframes pulse-green { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.4); } 50% { box-shadow: 0 0 0 8px rgba(34,197,94,0); } }
    .pulse { animation: pulse-green 2s infinite; }

    /* Setup modal */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:50; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(8px); }

    /* HR calculator */
    input[type=range] { accent-color: var(--green); }
    input[type=date], input[type=number], input[type=text] { background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px; width: 100%; font-size: 15px; outline: none; }
    input[type=date]:focus, input[type=number]:focus { border-color: var(--green); }
    textarea { background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px; width: 100%; font-size: 14px; outline: none; resize: none; font-family: inherit; }
    textarea:focus { border-color: var(--green); }

    /* Log modal */
    .log-modal { position:fixed; inset:0; z-index:60; display:flex; align-items:flex-end; justify-content:center; background:rgba(0,0,0,.6); backdrop-filter:blur(8px); }
    .log-sheet { background: var(--card); border-radius: 24px 24px 0 0; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; padding: 24px 20px 40px; }
    .rpe-btn { flex:1; padding:8px 4px; border-radius:10px; font-size:13px; font-weight:700; text-align:center; cursor:pointer; border:2px solid transparent; transition:all .15s; background:rgba(255,255,255,.05); color:var(--gray); }
    .rpe-btn.sel { border-color: var(--green); background: var(--green-dim); color: var(--green); }
    .choice-btn { padding:8px 14px; border-radius:999px; font-size:12px; font-weight:700; cursor:pointer; border:1.5px solid rgba(255,255,255,.1); color:var(--gray); background:rgba(255,255,255,.04); transition:all .15s; }
    .choice-btn.sel { border-color:var(--green); color:var(--green); background:var(--green-dim); }
    .mood-btn { font-size:22px; padding:6px 10px; border-radius:12px; cursor:pointer; border:2px solid transparent; transition:all .15s; }
    .mood-btn.sel { border-color:var(--green); background:var(--green-dim); transform:scale(1.2); }
    .log-section { margin-bottom:20px; }
    .log-label { font-size:12px; font-weight:700; color:var(--gray); margin-bottom:8px; }
  </style>
</head>
<body>

<!-- ─── Setup Modal ─────────────────────────────────── -->
<div id="setupModal" class="modal-bg hidden">
  <div class="glass rounded-3xl p-8 mx-4 max-w-sm w-full fade-up">
    <div class="text-4xl text-center mb-3">🏃</div>
    <h2 class="text-2xl font-black text-center mb-1">你好，跑者！</h2>
    <p class="text-center text-sm mb-6" style="color:var(--gray)">设置开始日期，解锁你的12周计划</p>
    <div class="space-y-4">
      <div>
        <label class="text-xs font-bold mb-1.5 block" style="color:var(--gray)">你的名字</label>
        <input type="text" id="setupName" placeholder="例如：小雨" maxlength="12">
      </div>
      <div>
        <label class="text-xs font-bold mb-1.5 block" style="color:var(--gray)">第1周开始日期</label>
        <input type="date" id="setupDate">
      </div>
      <div>
        <label class="text-xs font-bold mb-1.5 block" style="color:var(--gray)">你的年龄（用于计算心率）</label>
        <input type="number" id="setupAge" placeholder="例如：28" min="15" max="70">
      </div>
      <button onclick="saveSetup()" class="w-full font-black py-3.5 rounded-2xl text-black text-base active:scale-95 transition-transform" style="background:var(--green)">
        开始我的跑步之旅 →
      </button>
    </div>
  </div>
</div>

<!-- ─── Run Log Modal ───────────────────────────────── -->
<div id="logModal" class="log-modal hidden">
  <div class="log-sheet">
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-black">📝 跑后记录</h2>
      <button onclick="closeLog()" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 text-xl" style="background:rgba(255,255,255,.07)">&times;</button>
    </div>

    <!-- 1. Duration -->
    <div class="log-section">
      <p class="log-label">⏱ 实际跑了多久（分钟）</p>
      <input type="number" id="logDuration" placeholder="例如：30" min="1" max="180" style="width:120px">
    </div>

    <!-- 2. RPE -->
    <div class="log-section">
      <p class="log-label">💪 感知用力度（RPE）— 这次跑步有多累？</p>
      <div class="flex gap-1.5 flex-wrap" id="logRpeGroup">
        <button class="rpe-btn" onclick="selRpe(1)" id="rpe1">1<br><span style="font-size:9px;font-weight:400">极轻松</span></button>
        <button class="rpe-btn" onclick="selRpe(2)" id="rpe2">2</button>
        <button class="rpe-btn" onclick="selRpe(3)" id="rpe3">3<br><span style="font-size:9px;font-weight:400">轻松</span></button>
        <button class="rpe-btn" onclick="selRpe(4)" id="rpe4">4</button>
        <button class="rpe-btn" onclick="selRpe(5)" id="rpe5">5<br><span style="font-size:9px;font-weight:400">中等</span></button>
        <button class="rpe-btn" onclick="selRpe(6)" id="rpe6">6</button>
        <button class="rpe-btn" onclick="selRpe(7)" id="rpe7">7<br><span style="font-size:9px;font-weight:400">较累</span></button>
        <button class="rpe-btn" onclick="selRpe(8)" id="rpe8">8</button>
        <button class="rpe-btn" onclick="selRpe(9)" id="rpe9">9<br><span style="font-size:9px;font-weight:400">很累</span></button>
        <button class="rpe-btn" onclick="selRpe(10)" id="rpe10">10<br><span style="font-size:9px;font-weight:400">极限</span></button>
      </div>
    </div>

    <!-- 3. Completion -->
    <div class="log-section">
      <p class="log-label">✅ 完成情况</p>
      <div class="flex gap-2 flex-wrap" id="logCompGroup">
        <button class="choice-btn" onclick="selComp('full')">全程跑完了</button>
        <button class="choice-btn" onclick="selComp('walk')">中途走了几步</button>
        <button class="choice-btn" onclick="selComp('cut')">提前结束了</button>
      </div>
    </div>

    <!-- 4. Breathing -->
    <div class="log-section">
      <p class="log-label">🌬 呼吸顺畅度</p>
      <div class="flex gap-2 flex-wrap" id="logBreathGroup">
        <button class="choice-btn" onclick="selBreath('很顺')">很顺畅</button>
        <button class="choice-btn" onclick="selBreath('还好')">还可以</button>
        <button class="choice-btn" onclick="selBreath('喘')">有点喘</button>
        <button class="choice-btn" onclick="selBreath('很喘')">很喘</button>
      </div>
    </div>

    <!-- 5. Legs -->
    <div class="log-section">
      <p class="log-label">🦵 腿部感觉</p>
      <div class="flex gap-2 flex-wrap" id="logLegGroup">
        <button class="choice-btn" onclick="selLeg('轻盈')">很轻盈</button>
        <button class="choice-btn" onclick="selLeg('正常')">正常</button>
        <button class="choice-btn" onclick="selLeg('沉')">有点沉</button>
        <button class="choice-btn" onclick="selLeg('酸')">酸痛</button>
        <button class="choice-btn" onclick="selLeg('很重')">很沉很累</button>
      </div>
    </div>

    <!-- 6. Discomfort -->
    <div class="log-section">
      <p class="log-label">🩹 有无不适（可多选）</p>
      <div class="flex gap-2 flex-wrap" id="logPainGroup">
        <button class="choice-btn" onclick="togPain('none')">没有不适</button>
        <button class="choice-btn" onclick="togPain('side')">侧腹痛</button>
        <button class="choice-btn" onclick="togPain('knee')">膝盖不适</button>
        <button class="choice-btn" onclick="togPain('shin')">小腿酸痛</button>
        <button class="choice-btn" onclick="togPain('ankle')">脚踝不适</button>
        <button class="choice-btn" onclick="togPain('back')">腰背不适</button>
      </div>
    </div>

    <!-- 7. Mood -->
    <div class="log-section">
      <p class="log-label">😊 跑完心情</p>
      <div class="flex gap-3" id="logMoodGroup">
        <button class="mood-btn" onclick="selMood('😞')" id="mood0">😞</button>
        <button class="mood-btn" onclick="selMood('😐')" id="mood1">😐</button>
        <button class="mood-btn" onclick="selMood('🙂')" id="mood2">🙂</button>
        <button class="mood-btn" onclick="selMood('😄')" id="mood3">😄</button>
        <button class="mood-btn" onclick="selMood('🤩')" id="mood4">🤩</button>
      </div>
    </div>

    <!-- 8. Notes -->
    <div class="log-section">
      <p class="log-label">✏️ 自由感受（想说什么都行）</p>
      <textarea id="logNotes" rows="3" placeholder="今天感觉怎么样？有什么想记下来的？"></textarea>
    </div>

    <button onclick="saveLog()" class="w-full font-black py-4 rounded-2xl text-black text-base active:scale-95 transition-transform" style="background:var(--green)">
      保存这次记录 ✓
    </button>
  </div>
</div>

<!-- ─── Nav ────────────────────────────────────────── -->
<nav class="fixed top-0 left-0 right-0 z-40 flex items-center justify-between px-5 py-3.5" style="background:rgba(8,13,23,.85); backdrop-filter:blur(16px); border-bottom:1px solid var(--border)">
  <div class="flex items-center gap-2">
    <span class="text-xl">🏃</span>
    <span class="font-black text-base tracking-tight">跑起来</span>
  </div>
  <div id="navInfo" class="hidden flex items-center gap-2">
    <span id="navWeekBadge" class="badge badge-green">第1周</span>
    <button onclick="openSettings()" class="text-xs px-3 py-1.5 rounded-full font-bold" style="background:rgba(255,255,255,0.06);color:var(--gray)">设置</button>
  </div>
</nav>

<!-- ─── App ────────────────────────────────────────── -->
<div id="app" class="hidden pt-16">

  <!-- Hero -->
  <div class="hero-bg px-5 pt-10 pb-8">
    <div class="max-w-lg mx-auto">
      <p id="heroGreet" class="text-sm font-bold mb-1" style="color:var(--green)">第1周 · 开始</p>
      <h1 class="text-3xl font-black leading-tight mb-2">迈出第一步<br>改变从今天开始</h1>
      <p id="heroSub" class="text-sm mb-6" style="color:var(--gray)">12周后，你将完成人生第一个5公里</p>

      <!-- Progress overview -->
      <div class="glass rounded-2xl p-5 mb-2 green-glow">
        <div class="flex justify-between items-center mb-3">
          <span class="text-sm font-bold">总体进度</span>
          <span id="progressPct" class="text-sm font-black accent">0%</span>
        </div>
        <div class="prog-bar mb-4">
          <div id="progressBar" class="prog-fill" style="width:0%"></div>
        </div>
        <div class="grid grid-cols-3 gap-3 text-center">
          <div>
            <p id="statWeek" class="text-xl font-black accent">1</p>
            <p class="text-xs" style="color:var(--gray)">当前周次</p>
          </div>
          <div>
            <p id="statKm" class="text-xl font-black" style="color:var(--orange)">0</p>
            <p class="text-xs" style="color:var(--gray)">累计公里</p>
          </div>
          <div>
            <p id="statDays" class="text-xl font-black text-white">84</p>
            <p class="text-xs" style="color:var(--gray)">计划天数</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Week Roadmap -->
  <div class="px-5 py-5 max-w-lg mx-auto">
    <p class="text-xs font-bold mb-3" style="color:var(--gray)">12周路线图</p>
    <div class="overflow-x-auto pb-2">
      <div id="weekRoadmap" class="flex gap-2 relative" style="min-width:max-content">
        <!-- generated by JS -->
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="px-5 max-w-lg mx-auto">
    <div class="flex gap-1 mb-5 glass rounded-2xl p-1">
      <button class="tab active flex-1 text-center" onclick="switchTab('training')" id="tab-training">本周训练</button>
      <button class="tab flex-1 text-center" onclick="switchTab('knowledge')" id="tab-knowledge">本周知识</button>
      <button class="tab flex-1 text-center" onclick="switchTab('plan')" id="tab-plan">全程计划</button>
    </div>

    <!-- Training tab -->
    <div id="panel-training" class="fade-up">
      <div id="trainingContent"></div>
    </div>

    <!-- Knowledge tab -->
    <div id="panel-knowledge" class="hidden fade-up">
      <div id="knowledgeContent"></div>
    </div>

    <!-- Full plan tab -->
    <div id="panel-plan" class="hidden fade-up">
      <div id="planContent"></div>
    </div>
  </div>

  <div class="h-16"></div>
</div>

<script>
// ─── Data ────────────────────────────────────────────
const PLAN = [
  {
    week: 1, topic: '心率与跑步区间', icon: '❤️', color: '#ef4444',
    weeklyKm: '9–12 km',
    sessions: [
      { day: '第1次', label: '2区心率慢跑 30分钟', desc: '全程慢跑，不要求配速——只要求"跑得可控"。能一边跑一边正常说话，速度就是对的。', duration: 30, type: 'run', sessionId: 'w1s1' },
      { day: '第2次', label: '2区心率慢跑 30分钟', desc: '和上次一样，注意感受心率和呼吸的变化。比第1次更放松了吗？', duration: 30, type: 'run', sessionId: 'w1s2' },
      { day: '第3次', label: '2区心率慢跑 30分钟', desc: '本周最后一跑！跑完用"说话测试"回顾：全程都能说完整句子吗？', duration: 30, type: 'run', sessionId: 'w1s3' },
    ],
    concept: {
      title: '什么是"慢跑"？',
      body: '慢跑不是慢慢走，也不是冲刺。它是一种你能维持长时间、呼吸顺畅的跑步节奏。判断标准只有一条：<strong>你能用正常语速说完一整句话吗？</strong> 能说 → 速度刚好。说不完整 → 跑慢一点。',
    },
    tips: {
      before: [
        '🍞 跑前1.5–2小时：吃1–2片白面包，或1根香蕉——补充一点碳水，不要空腹跑',
        '💧 跑前15–30分钟：小口抿水200–300ml，不要大口猛喝',
        '👟 检查鞋带、衣服是否舒适，带上手机',
      ],
      after: [
        '💧 跑完立即补水，小口慢饮，分多次喝，目标500ml内',
        '🚶 不要立刻坐下！先慢走3–5分钟让心率平缓下来',
        '🍌 如果感觉饿，可以吃一根香蕉或喝一杯牛奶',
      ],
    },
    knowledge: {
      title: '心率区间：让数据指导你的每一步',
      summary: '跑太快是新手最常犯的错误。理解心率区间，你才能真正高效地训练。',
      sections: [
        {
          heading: '最大心率怎么估算？',
          text: '最常见公式是 <strong>220 − 年龄</strong>，但这只是一个粗略估算，误差可达 ±10–15 bpm，不同个体差异很大。<br><br>更准确的公式（Tanaka 公式，适合成年人）：<strong>208 − (0.7 × 年龄)</strong><br>例如28岁：208 − (0.7 × 28) = <strong>188 bpm</strong><br><br>⚠️ 任何公式都不如实测准确。真正的最大心率需要在实验室或全力测试中获得——新手不建议做最大心率测试，有一定心肺基础后再说。下面的区间数字仅供参考方向，不必纠结于精确值。',
        },
        {
          heading: '5个心率区间',
          zones: [
            { z: 'Zone 1', pct: '50–60%', label: '超轻松', desc: '热身、冷身、轻松散步', color: '#3b82f6', w: 50 },
            { z: 'Zone 2', pct: '60–70%', label: '有氧基础 ⭐', desc: '脂肪燃烧最高效，线粒体增殖，能轻松说完整句子', color: '#22c55e', w: 65 },
            { z: 'Zone 3', pct: '70–80%', label: '有氧进阶', desc: '稍微喘气，只能说短句，"灰色地带"——进步慢且消耗大', color: '#eab308', w: 75 },
            { z: 'Zone 4', pct: '80–90%', label: '乳酸阈值', desc: '较难说话，提升乳酸阈值，适合进阶者配速跑', color: '#f97316', w: 85 },
            { z: 'Zone 5', pct: '90–100%', label: '无氧冲刺', desc: '无法说话，只能维持30秒–3分钟，间歇训练用', color: '#ef4444', w: 95 },
          ],
        },

// ─── State ───────────────────────────────────────────
let state = JSON.parse(localStorage.getItem('runstart_v1') || '{}');
let selectedWeek = 1;
let activeTab = 'training';

function saveState() { localStorage.setItem('runstart_v1', JSON.stringify(state)); }

function currentWeekNum() {
  if (!state.startDate) return 1;
  const start = new Date(state.startDate);
  const now = new Date();
  const diff = Math.floor((now - start) / (7 * 24 * 60 * 60 * 1000));
  return Math.max(1, Math.min(12, diff + 1));
}

function isUnlocked(week) {
  return week <= currentWeekNum();
}

// ─── Mark session done ────────────────────────────────
function markDone(sid, week) {
  if ((state.doneSessions || []).includes(sid)) return;
  state.doneSessions = state.doneSessions || [];
  state.doneSessions.push(sid);
  saveState();
  renderTraining();
  // auto-open log modal
  setTimeout(() => openLog(week), 200);
}

// ─── Run Log ──────────────────────────────────────────
let _logWeek = 1, _logRpe = null, _logComp = null, _logBreath = null, _logLeg = null, _logMood = null, _logPain = new Set();

function openLog(week) {
  _logWeek = week; _logRpe = null; _logComp = null; _logBreath = null; _logLeg = null; _logMood = null; _logPain = new Set();
  document.getElementById('logDuration').value = '';
  document.getElementById('logNotes').value = '';
  ['rpe','comp','breath','leg','mood','pain'].forEach(g => {
    const el = document.getElementById('log' + g[0].toUpperCase() + g.slice(1) + 'Group');
    if (el) el.querySelectorAll('button').forEach(b => b.classList.remove('sel'));
  });
  document.getElementById('logModal').classList.remove('hidden');
}
function closeLog() { document.getElementById('logModal').classList.add('hidden'); }

function selRpe(v) {
  _logRpe = v;
  for (let i=1;i<=10;i++) document.getElementById('rpe'+i)?.classList.toggle('sel', i===v);
}
function selComp(v) {
  _logComp = v;
  document.getElementById('logCompGroup').querySelectorAll('button').forEach(b => b.classList.toggle('sel', b.onclick.toString().includes("'"+v+"'")));
}
function selBreath(v) {
  _logBreath = v;
  document.getElementById('logBreathGroup').querySelectorAll('button').forEach(b => b.classList.toggle('sel', b.onclick.toString().includes("'"+v+"'")));
}
function selLeg(v) {
  _logLeg = v;
  document.getElementById('logLegGroup').querySelectorAll('button').forEach(b => b.classList.toggle('sel', b.onclick.toString().includes("'"+v+"'")));
}
function selMood(v) {
  _logMood = v;
  document.getElementById('logMoodGroup').querySelectorAll('button').forEach(b => b.classList.toggle('sel', b.textContent.trim()===v));
}
function togPain(v) {
  if (v === 'none') { _logPain = new Set(['none']); }
  else { _logPain.delete('none'); _logPain.has(v) ? _logPain.delete(v) : _logPain.add(v); }
  document.getElementById('logPainGroup').querySelectorAll('button').forEach(b => {
    const key = b.onclick.toString().match(/'([^']+)'/)?.[1];
    b.classList.toggle('sel', key && _logPain.has(key));
  });
}

function saveLog() {
  const dur = parseInt(document.getElementById('logDuration').value) || null;
  const notes = document.getElementById('logNotes').value.trim();
  const now = new Date();
  const date = `${now.getMonth()+1}/${now.getDate()}`;
  const entry = { week: _logWeek, date, duration: dur, rpe: _logRpe, completion: _logComp,
    breath: _logBreath, leg: _logLeg, mood: _logMood, pain: [..._logPain], notes, ts: Date.now() };
  state.logs = state.logs || [];
  state.logs.push(entry);
  saveState();
  closeLog();
  renderTraining();
}

// ─── Setup ───────────────────────────────────────────
function openSetup() {
  const m = document.getElementById('setupModal');
  m.classList.remove('hidden');
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('setupDate').value = state.startDate || today;
  document.getElementById('setupName').value = state.name || '';
  document.getElementById('setupAge').value = state.age || '';
}

function openSettings() { openSetup(); }

function saveSetup() {
  const name = document.getElementById('setupName').value.trim();
  const date = document.getElementById('setupDate').value;
  const age  = parseInt(document.getElementById('setupAge').value) || 28;
  if (!date) { alert('请选择开始日期'); return; }
  state = { ...state, name: name || '跑者', startDate: date, age };
  saveState();
  document.getElementById('setupModal').classList.add('hidden');
  init();
}

// ─── Init ─────────────────────────────────────────────
function init() {
  if (!state.startDate) { openSetup(); return; }
  document.getElementById('setupModal').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('navInfo').classList.remove('hidden');

  const curWeek = currentWeekNum();
  selectedWeek = curWeek;

  // Hero
  const names = { '周一': 'Mon', '周三': 'Wed', '周六': 'Sat' };
  document.getElementById('heroGreet').textContent = `第${curWeek}周 · ${state.name || '跑者'}，加油！`;
  document.getElementById('heroSub').textContent = `12周后你将完成人生第一个5公里 · 已坚持 ${curWeek - 1} 周`;
  document.getElementById('navWeekBadge').textContent = `第${curWeek}周`;

  // Progress
  const pct = Math.round(((curWeek - 1) / 12) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('statWeek').textContent = curWeek;
  document.getElementById('statDays').textContent = Math.max(0, 84 - (curWeek - 1) * 7);

  // Cumulative km estimate
  const kmPerWeek = [7, 9, 11, 13, 15, 17, 19, 19, 21, 21, 19, 13];
  let totalKm = 0;
  for (let i = 0; i < curWeek - 1; i++) totalKm += kmPerWeek[i] || 0;
  document.getElementById('statKm').textContent = totalKm;

  renderRoadmap();
  renderContent();
}

// ─── Roadmap ──────────────────────────────────────────
function renderRoadmap() {
  const curWeek = currentWeekNum();
  const container = document.getElementById('weekRoadmap');
  container.innerHTML = '';
  PLAN.forEach(w => {
    const done = w.week < curWeek;
    const cur  = w.week === curWeek;
    const sel  = w.week === selectedWeek;
    const cls  = done ? 'done' : cur ? 'current' : 'future';
    const div = document.createElement('div');
    div.className = `week-pill ${cls} ${sel ? 'active' : ''} flex flex-col items-center gap-1`;
    div.onclick = () => selectWeek(w.week);
    div.innerHTML = `
      <div class="dot ${cur && sel ? 'pulse' : ''}">
        ${done ? '✓' : w.week}
      </div>
      <span class="text-center leading-tight" style="font-size:9px;color:${sel ? 'var(--green)' : 'var(--gray)'}">
        ${w.icon}<br>${w.topic.split('与')[0].split('的')[0].slice(0,4)}
      </span>`;
    container.appendChild(div);
  });
}

function selectWeek(week) {
  selectedWeek = week;
  renderRoadmap();
  renderContent();
  // scroll to content
  document.getElementById('panel-' + activeTab).scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─── Tabs ─────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  ['training','knowledge','plan'].forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('hidden', t !== tab);
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  renderContent();
}

// ─── Content ──────────────────────────────────────────
function renderContent() {
  renderTraining();
  renderKnowledge();
  renderPlan();
}

      html += `<p class="text-xs font-bold mb-2 mt-4" style="color:var(--gray)">📒 本周记录（${logs.length}次）</p>`;
      logs.slice().reverse().forEach(l => {
        html += `<div class="glass2 rounded-xl p-3 mb-2 text-xs" style="color:#94a3b8">
          <div class="flex justify-between items-center mb-1">
            <span class="font-bold" style="color:var(--text)">${l.mood || ''} ${l.date}</span>
            <span class="badge badge-green">${l.duration ? l.duration+'分钟' : ''}</span>
          </div>
          <div class="flex gap-2 flex-wrap">
            ${l.rpe ? `<span class="badge badge-gray">用力度 ${l.rpe}/10</span>` : ''}
            ${l.completion ? `<span class="badge badge-gray">${{full:'全程完成',walk:'中途走了',cut:'提前结束'}[l.completion]||l.completion}</span>` : ''}
            ${l.breath ? `<span class="badge badge-gray">呼吸${l.breath}</span>` : ''}
            ${l.leg ? `<span class="badge badge-gray">腿${l.leg}</span>` : ''}
          </div>
          ${l.notes ? `<p class="mt-1.5 italic">"${l.notes}"</p>` : ''}
        </div>`;
      });
    }

    // Log button
    if (isUnlocked(w.week)) {
      html += `<button onclick="openLog(${w.week})" class="w-full font-black py-4 rounded-2xl text-sm mt-3 active:scale-95 transition-transform fade-up"
        style="background:var(--green-dim);color:var(--green);border:1.5px solid rgba(34,197,94,.3)">
        ＋ 记录这次跑步
      </button>`;
    }
  }
  document.getElementById('trainingContent').innerHTML = html;
}

function renderKnowledge() {
  const w = PLAN[selectedWeek - 1];
  const unlocked = isUnlocked(w.week);
  let html = '';

  html += `<div class="flex items-center gap-3 mb-4 fade-up">
    <div class="w-11 h-11 rounded-2xl flex items-center justify-center text-2xl" style="background:${w.color}22; border:1px solid ${w.color}44">${w.icon}</div>
    <div>
      <p class="font-black">${w.knowledge.title}</p>
      <p class="text-xs mt-0.5" style="color:var(--gray)">第 ${w.week} 周知识</p>
    </div>
  </div>`;

  if (!unlocked) {
    const d = new Date(state.startDate);
    d.setDate(d.getDate() + (w.week - 1) * 7);
    html += `<div class="glass rounded-2xl p-6 text-center locked-card fade-up">
      <div class="text-3xl mb-2">🔒</div>
      <p class="font-bold mb-1">第 ${w.week} 周知识尚未解锁</p>
      <p class="text-sm" style="color:var(--gray)">${d.getMonth()+1}月${d.getDate()}日解锁</p>
    </div>`;
    document.getElementById('knowledgeContent').innerHTML = html;
    return;
  }

  // Summary
  html += `<div class="know-card glass rounded-2xl p-4 mb-4 fade-up">
    <p class="text-sm leading-relaxed" style="color:#94a3b8">${w.knowledge.summary}</p>
  </div>`;

  // Sections
  w.knowledge.sections.forEach((sec, i) => {
    html += `<div class="glass rounded-2xl p-4 mb-3 fade-up" style="animation-delay:${i * 0.05}s">
      <p class="font-black text-sm mb-3" style="color:var(--green)">${sec.heading}</p>`;

    if (sec.zones) {
      const age = state.age || 28;
      const max220  = 220 - age;
      const maxTana = Math.round(208 - 0.7 * age);
      html += `<div class="glass2 rounded-xl p-3 mb-3">
        <p class="text-xs mb-2 text-center" style="color:var(--gray)">你的估算最大心率（${age}岁）</p>
        <div class="grid grid-cols-2 gap-2 text-center">
          <div>
            <p class="text-2xl font-black accent">${max220}</p>
            <p class="text-xs mt-0.5" style="color:var(--gray)">220−年龄</p>
          </div>
          <div>
            <p class="text-2xl font-black" style="color:var(--orange)">${maxTana}</p>
            <p class="text-xs mt-0.5" style="color:var(--gray)">Tanaka公式（更准）</p>
          </div>
        </div>
      </div>`;
      sec.zones.forEach(z => {
        const lo = Math.round(max * parseInt(z.pct) / 100);
        const hi = Math.round(max * parseInt(z.pct.split('–')[1]) / 100);
        html += `<div class="zone-bar mb-2" style="background:${z.color}22; border:1px solid ${z.color}33">
          <div class="flex items-center gap-2 w-full">
            <span style="color:${z.color};min-width:60px;font-size:11px">${z.z}</span>
            <span class="flex-1 text-xs font-bold" style="color:var(--text)">${z.label}</span>
            <span style="color:${z.color};font-size:11px;font-weight:700">${lo}–${hi}</span>
          </div>
        </div>
        <p class="text-xs mb-3 pl-1" style="color:var(--gray)">${z.desc}</p>`;
      });
    } else if (sec.text) {
      html += `<p class="text-sm leading-relaxed" style="color:#94a3b8">${sec.text}</p>`;
    }

    if (sec.tips) {
      sec.tips.forEach(tip => {
        html += `<div class="flex gap-2 mb-2 text-sm">
          <span class="flex-shrink-0 mt-0.5">${tip.slice(0,2)}</span>
          <span style="color:#94a3b8">${tip.slice(2)}</span>
        </div>`;
      });
    }

    if (sec.table) {
      html += `<div class="overflow-x-auto -mx-1">
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead>
            <tr style="color:var(--gray)">
              <th style="padding:6px 8px;text-align:left;font-weight:700">距离</th>
              <th style="padding:6px 4px;text-align:center;font-weight:700;color:#94a3b8">入门</th>
              <th style="padding:6px 4px;text-align:center;font-weight:700;color:var(--green)">进阶</th>
              <th style="padding:6px 4px;text-align:center;font-weight:700;color:var(--orange)">精英业余</th>
            </tr>
          </thead>
          <tbody>`;
      sec.table.forEach((r, i) => {
        html += `<tr style="border-top:1px solid var(--border);background:${i%2?'rgba(255,255,255,.02)':''}">
          <td style="padding:8px;font-weight:700;color:var(--text)">${r.dist}</td>
          <td style="padding:8px 4px;text-align:center;color:#94a3b8">
            <div>${r.beg}</div><div style="color:var(--gray);font-size:10px">${r.pace_beg}</div>
          </td>
          <td style="padding:8px 4px;text-align:center;color:var(--green)">
            <div>${r.mid}</div><div style="color:#4ade80;font-size:10px">${r.pace_mid}</div>
          </td>
          <td style="padding:8px 4px;text-align:center;color:var(--orange)">
            <div>${r.adv}</div><div style="color:#fb923c;font-size:10px">${r.pace_adv}</div>
          </td>
        </tr>`;
      });
      html += `</tbody></table></div>
      <p class="text-xs mt-2" style="color:var(--gray)">⚠️ 参考值，实际因年龄/体能/性别/气候差异较大。入门 = 刚起步，进阶 = 训练6–12个月，精英业余 = 多年系统训练。</p>`;
    }

    html += `</div>`;
  });

  document.getElementById('knowledgeContent').innerHTML = html;
}

function renderPlan() {
  let html = '<div class="fade-up">';
  html += `<p class="text-xs font-bold mb-4" style="color:var(--gray)">点击任意周次查看详情</p>`;
  const curWeek = currentWeekNum();
  PLAN.forEach(w => {
    const done = w.week < curWeek;
    const cur  = w.week === curWeek;
    const sel  = w.week === selectedWeek;
    html += `<div onclick="selectWeek(${w.week}); switchTab('training')"
      class="glass rounded-2xl p-4 mb-2 cursor-pointer transition-all"
      style="border-color:${sel ? 'rgba(34,197,94,.4)' : 'var(--border)'}">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-full flex items-center justify-center font-black text-sm flex-shrink-0"
          style="background:${done ? 'var(--green)' : cur ? 'var(--green-dim)' : 'rgba(255,255,255,.05)'};
                 color:${done ? '#000' : cur ? 'var(--green)' : 'var(--gray)'};
                 border:2px solid ${done ? 'var(--green)' : cur ? 'var(--green)' : 'rgba(255,255,255,.08)'}">
          ${done ? '✓' : w.week}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <p class="font-bold text-sm">${w.icon} 第${w.week}周 · ${w.topic}</p>
          </div>
          <p class="text-xs mt-0.5" style="color:var(--gray)">${w.weeklyKm} · ${w.sessions.filter(s=>s.type==='run'||s.type==='race').length}次训练</p>
        </div>
        <span class="badge ${done ? 'badge-green' : cur ? 'badge-orange' : 'badge-gray'} flex-shrink-0 text-xs">
          ${done ? '完成' : cur ? '本周' : '待解锁'}
        </span>
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('planContent').innerHTML = html;
}

// ─── Boot ─────────────────────────────────────────────
window.addEventListener('load', () => {
  if (!state.startDate) {
    document.getElementById('setupModal').classList.remove('hidden');
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('setupDate').value = today;
  } else {
    init();
  }
});
</script>
</body>
</html>
